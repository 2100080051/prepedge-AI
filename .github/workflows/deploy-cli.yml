name: Deploy via Azure CLI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Backend Code
        run: |
          echo "Deploying backend..."
          cd backend
          zip -r ../backend.zip . -x "*.venv*" "*.git*" "*__pycache__*"
          cd ..
          az webapp deployment source config-zip \
            --resource-group prepedge-ai-prod-services \
            --name prepedge-api-prod \
            --src-path backend.zip
          echo "Backend deployed successfully!"

      - name: Deploy Frontend Code
        run: |
          echo "Deploying frontend..."
          cd frontend
          npm install
          npm run build
          zip -r ../frontend.zip . -x "*node_modules*" "*.git*" "*next*"
          cd ..
          az webapp deployment source config-zip \
            --resource-group prepedge-ai-prod-services \
            --name prepedge-web-prod \
            --src-path frontend.zip
          echo "Frontend deployed successfully!"

      - name: Verify Deployment
        run: |
          echo "✅ Backend API: https://api.prepedgeai.in"
          echo "✅ Frontend Web: https://www.prepedgeai.in"
