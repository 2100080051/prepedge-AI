# Production Docker Compose setup for PrepEdge AI
# Includes: FastAPI backend, PostgreSQL, Redis, Celery workers, Nginx

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: prepedge-db
    environment:
      POSTGRES_USER: prepedge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: prepedge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prepedge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prepedge-network

  # Redis (Cache + Message Broker)
  redis:
    image: redis:7-alpine
    container_name: prepedge-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prepedge-network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prepedge-api
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://prepedge:${DB_PASSWORD}@db:5432/prepedge
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      FRONTEND_URL: https://prepedge.com
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - prepedge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prepedge-worker
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://prepedge:${DB_PASSWORD}@db:5432/prepedge
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db
      - redis
      - api
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.celery_app worker -l info --concurrency=4
    networks:
      - prepedge-network

  # Celery Beat (Task Scheduler)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prepedge-beat
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://prepedge:${DB_PASSWORD}@db:5432/prepedge
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db
      - redis
      - api
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - prepedge-network

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: prepedge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - prepedge-network

volumes:
  postgres_data:
  redis_data:

networks:
  prepedge-network:
    driver: bridge
